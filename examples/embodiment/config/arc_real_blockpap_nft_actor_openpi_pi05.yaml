defaults:
  - env/blockpap-v1@env.train
  - env/blockpap-v1@env.eval
  - model/pi0_5@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor,rollout: 2-5
    env: 2-5

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf_pi-stepnft_rl
    experiment_name: "blockpap_nft_pi05_chunk8"
    logger_backends: ["wandb"]
    wandb_entity: "aaroncaozj_team"

  max_epochs: 400
  max_steps: -1
  only_eval: False
  val_check_interval: 5

  save_interval: 10
  save_last_n_steps: 10
  eval_last_every_k_steps: 2

  resume_dir: null
  ckpt_path: /workspace1/zhijun/RLinf/logs/20260317-14:18:32/new_norm_stats_stride2/checkpoints/global_step_5000/actor/model_state_dict/full_weights.pt

algorithm:
  normalize_advantages: True
  kl_penalty: kl
  group_size: 1
  reward_coef: 1.0
  rollout_epoch: 8
  eval_rollout_epoch: 1

  reward_type: chunk_level
  logprob_type: token_level
  entropy_type: chunk_level

  update_epoch: 5
  adv_type: terminal-binary
  loss_type: nft-actor
  loss_agg_func: "token-mean"

  kl_beta: 0.0001
  nft_beta: 1.0
  clip_ratio_high: 1.0

  value_clip: 0.2
  huber_delta: 10.0
  gamma: 0.99
  gae_lambda: 0.95

  base: 0.1
  target: 0.995

  filter_rewards: False
  rewards_lower_bound: 0.0
  rewards_upper_bound: 1.0

  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0
    add_BOS: False

  length_params:
    max_new_token: null
    max_length: 1024
    min_length: 1

env:
  group_name: "EnvGroup"
  enable_offload: False
  train:
    total_num_envs: 64
    group_size: ${algorithm.group_size}
    auto_reset: True
    ignore_terminations: False
    use_fixed_reset_state_ids: False
    max_episode_steps: 320
    max_steps_per_rollout_epoch: 320
    video_cfg:
      save_video: True
      video_fps: 20
      show_extra_views: False  # set True to show back_cam side-by-side in train video

  eval:
    total_num_envs: 64
    auto_reset: True
    ignore_terminations: True
    max_episode_steps: 320
    max_steps_per_rollout_epoch: 320
    use_fixed_reset_state_ids: False
    group_size: ${algorithm.group_size}
    is_eval: True
    video_cfg:
      save_video: True
      video_fps: 20
      video_base_dir: ${runner.logger.log_path}/video/eval
      show_extra_views: False  # set True to show back_cam side-by-side in eval video

rollout:
  group_name: "RolloutGroup"
  generation_backend: "huggingface"
  recompute_logprobs: False
  unnorm_key: libero_10  # unused for flow-based models
  enable_offload: False
  pipeline_stage_num: 1

  model:
    model_path: "/workspace1/zhijun/hf_download/models/pi05_base"
    precision: ${actor.model.precision}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 256
  global_batch_size: 5120
  seed: 0
  enable_offload: False
  # Override the default values in model/pi0_5
  model:
    model_path: "/workspace1/zhijun/hf_download/models/pi05_base"
    model_name: "openpi"
    precision: null    # bf16
    num_action_chunks: 8
    action_dim: 7
    num_steps: 5
    add_value_head: False
    # openpi specific parameters
    openpi:
      config_name: "pi05_blockpap_mix"
      num_images_in_input: 1
      image_input_views: ["image"]   # ["image"] | ["image", "back_image"] | ["image", "back_image", "wrist_image"]
      action_horizon: 8
      detach_critic_input: True
      value_after_vlm: False      # pi0: False. pi0.5: True

      use_nft_loss: True
      solver_type: "flow_sde"
      noise_level: 0.2

    policy_setup: panda_wristcam  # BlockPAP uses Panda robot (not widowx)

  optim:
    lr: 8e-6
    value_lr: 1.55e-4
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-05
    clip_grad: 1.0
    critic_warmup_steps: 0

  # Override the default values in training_backend/fsdp
  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    gradient_checkpointing: False
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False